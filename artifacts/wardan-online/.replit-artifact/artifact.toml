kind = "web"
previewPath = "/"
title = "Wardan Online"
version = "1.0.0"
id = "artifacts/wardan-online"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23091

[services.development]
run = "pnpm --filter @workspace/wardan-online run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wardan-online", "run", "build" ]
publicDir = "artifacts/wardan-online/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23091"
BASE_PATH = "/"
